<!DOCTYPE html>
<html>
  <head>
    <title>Founder Training</title>

    <head>
  <title>Founder Training</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background-color: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    input {
      display: block;
      margin: 10px 0;
      padding: 8px;
      font-size: 14px;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px; 
    }

    #clearButton {
      background-color: #e74c3c;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 5px;
      cursor: pointer;
    }

    #clearButton:hover {
      background-color: #c0392b;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
  </head>
  <body>
    <h1>Day 1</h1>

    <input id="campaignName" placeholder="Campaign Name">
    <input id="spend" placeholder="Ad Spend">
    <input id="revenue" placeholder="Revenue">
    <input id="costOfGoods" placeholder="Cost of goods">
    <button onclick="calculate()">Calculate ROI</button>
    <button id="clearButton" onclick="clearCampaigns()">Clear Campaigns</button>

    <p id="result"></p>

    <h2>Campaign Results</h2>
    <ul id="campaignList"></ul>

    <h2>Campaign Summary</h2>

  <div id="summary">
    <p>Total Spend: $<span id="totalSpend">0</span></p>
    <p>Total Revenue: $<span id="totalRevenue">0</span></p>
    <p>Total Cost of Goods: $<span id="totalcostOfGoods">0</span></p>
    <p>Total Profit: $<span id="totalProfit">0</span></p>
    <p>Average ROI: <span id="avgROI">0</span>%</p>
  </div>
  

    <script src="script.js"></script>
  </body>
</html>
